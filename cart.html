<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>@swimorthink Cart</title>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/iconapple.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <!-- iOS App Mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="swimorthink">
  <link rel="apple-touch-icon" href="assets/icon192.png">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
<header>
  <a href="index.html">
    <img src="assets/logo.gif" alt="@swimorthink logo" class="logo" />
  </a>
  <div class="header-banner" id="account-banner">
    <a href="index.html" id="account-link">Home</a>
  </div>
</header>

<main>
  <div class="cart-container" id="cartContainer">
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Total: $0</div>
    <button id="startCheckoutBtn">checkout &amp; pay</button>
  </div>
</main>

<footer>
  <p>© <span id="year"></span>. All Rights Reserved.</p>
</footer>

<script src="https://js.stripe.com/v3/"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

function initCartPage() {
  var cart = JSON.parse(localStorage.getItem("cart")) || [];

  var cartItemsContainer = document.getElementById("cartItems");
  var cartTotalEl = document.getElementById("cartTotal");
  var checkoutBtn = document.getElementById("startCheckoutBtn");

  if (!cartItemsContainer || !cartTotalEl || !checkoutBtn) return;

  // Initialize stripe safely inside the function
  var stripeInstance = (typeof Stripe !== "undefined")
    ? Stripe("pk_live_51SQdhpQmVjRaXaSguVowcSf46mwucA7RnD5GGG5DUN8j9cdVNssaGvoZZ3fsskSCsGHKT3gIxIIAn23gzppOKYbn0014WgzAjT")
    : null;

  function renderCart() {
    cartItemsContainer.innerHTML = "";
    var total = 0;

    if (cart.length === 0) {
      var emptyMsg = document.createElement("p");
      emptyMsg.textContent = "your cart is empty 🛒";
      emptyMsg.style.fontSize = "1.2rem";
      emptyMsg.style.color = "#555";
      emptyMsg.style.marginTop = "1rem";
      cartItemsContainer.appendChild(emptyMsg);
      cartTotalEl.style.display = "none";
      checkoutBtn.style.display = "none";
      return;
    }

    cartTotalEl.style.display = "block";
    checkoutBtn.style.display = "inline-block";

    cart.forEach(function(item, index) {
      if (!item.quantity) item.quantity = 1;
      total += item.price * item.quantity;

      var cartItem = document.createElement("div");
      cartItem.className = "cart-item";

      var img = document.createElement("img");
      img.src = item.image;
      img.alt = item.name;

      var details = document.createElement("div");
      details.className = "cart-item-details";

      var name = document.createElement("p");
      var strong = document.createElement("strong");
      strong.textContent = item.name;
      name.appendChild(strong);

      var color = document.createElement("p");
      color.textContent = "Color: " + (item.color || "Default");

      var size = document.createElement("p");
      size.textContent = "Size: " + (item.size || "M");

      var priceEl = document.createElement("p");
      priceEl.textContent = "Price: $" + item.price;

      var qtyLabel = document.createElement("label");
      qtyLabel.textContent = "Quantity: ";

      var qtyInput = document.createElement("input");
      qtyInput.type = "number";
      qtyInput.min = "1";
      qtyInput.value = item.quantity;
      qtyInput.dataset.index = index;
      qtyInput.className = "quantity-input";

      qtyInput.addEventListener("change", function(e) {
        var idx = e.target.dataset.index;
        var val = parseInt(e.target.value);
        if (isNaN(val) || val < 1) val = 1;
        cart[idx].quantity = val;
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      });

      qtyLabel.appendChild(qtyInput);
      details.appendChild(name);
      details.appendChild(color);
      details.appendChild(size);
      details.appendChild(priceEl);
      details.appendChild(qtyLabel);

      var removeBtn = document.createElement("button");
      removeBtn.className = "remove-btn";
      removeBtn.textContent = "Remove";
      removeBtn.dataset.index = index;
      removeBtn.addEventListener("click", function(e) {
        var idx = parseInt(e.target.dataset.index);
        cart.splice(idx, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
      });

      cartItem.appendChild(img);
      cartItem.appendChild(details);
      cartItem.appendChild(removeBtn);
      cartItemsContainer.appendChild(cartItem);
    });

    cartTotalEl.textContent = "Total: $" + (Math.round(total * 100) / 100).toFixed(2);
  }

  renderCart();

  var oldBtn = document.getElementById("startCheckoutBtn");
  var newBtn = oldBtn.cloneNode(true);
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);

  newBtn.addEventListener("click", function() {
    cart = JSON.parse(localStorage.getItem("cart")) || [];
    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }

    if (!stripeInstance) {
      alert("Payment system not loaded. Please refresh and try again.");
      return;
    }

    fetch("/.netlify/functions/create-checkout-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ items: cart })
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      if (data.error) {
        alert("Checkout error: " + data.error);
        return;
      }
      return stripeInstance.redirectToCheckout({ sessionId: data.sessionId });
    })
    .then(function(result) {
      if (result && result.error) {
        alert(result.error.message);
      }
    })
    .catch(function(err) {
      console.error(err);
      alert("Checkout failed: " + err.message);
    });
  });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initCartPage);
} else {
  initCartPage();
}
</script>

<script src="pwa-nav.js"></script>
</body>
</html>
