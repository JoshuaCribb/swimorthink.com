<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icon16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/iconapple.png">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="swimorthink">
  <link rel="apple-touch-icon" href="assets/icon192.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>@swimorthink</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <a href="index.html">
    <img src="assets/logo.gif" class="logo" alt="@swimorthink logo">
  </a>
  <div class="header-banner">
    <a href="cart.html">My Cart</a>
  </div>
</header>

<main>
  <div class="picker-container">

    <div class="hat-frame">
      <img id="slipper" class="hat-image" src="assets/cremeslipper.png" alt="slipper">
    </div>

    <p class="price">$28</p>

    <div class="color-picker" id="colorPicker">
      <div class="color-option" data-color="creme" style="background:#fff;" data-src="assets/cremeslipper.png"></div>
      <div class="color-option" data-color="pink" style="background:pink;" data-src="assets/pinkslipperfront.png"></div>
      <div class="color-option" data-color="black" style="background:#000;" data-src="assets/blackslipperside.png"></div>
    </div>

    <div class="size-picker">
      <label for="sizeSelect">Size:</label>
      <select id="sizeSelect">
        <option value="" disabled selected>Select Size</option>
        <option>M5 W6.5 EU38</option>
        <option>M6 W7.5 EU39</option>
        <option>M7 W8.5 EU40</option>
        <option>M8 W9.5 EU41</option>
        <option>M9 W10.5 EU42</option>
        <option>M10 W11.5 EU43</option>
        <option>M11 W12.5 EU44</option>
        <option>M12 W13.5 EU45</option>
        <option>M13 W14.5 EU46</option>
        <option>M14 W15.5 EU47</option>
      </select>
    </div>

    <button id="addToCartBtn">Add to Cart</button>

  </div>
</main>

<footer>
  <p>© <span id="year"></span>. All Rights Reserved.</p>
</footer>

<script>
function initSlipperPage() {

  const img = document.getElementById("slipper");
  const picker = document.getElementById("colorPicker");
  const size = document.getElementById("sizeSelect");
  const btn = document.getElementById("addToCartBtn");
  const year = document.getElementById("year");

  if (!img || !picker || !size || !btn) return;

  if (year) year.textContent = new Date().getFullYear();

  picker.onclick = function (e) {
    const color = e.target.closest(".color-option");
    if (!color) return;

    img.src = color.dataset.src;

    picker.querySelectorAll(".color-option").forEach(function (el) {
      el.classList.remove("active");
    });

    color.classList.add("active");
  };

  btn.onclick = function () {

    const selectedSize = size.value;
    if (!selectedSize) return;

    const active =
      picker.querySelector(".color-option.active") ||
      picker.querySelector(".color-option");

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
      name: "slipper",
      color: active.dataset.color,
      size: selectedSize,
      image: img.src,
      price: 28
    });

    localStorage.setItem("cart", JSON.stringify(cart));
  };
}

document.addEventListener("DOMContentLoaded", initSlipperPage);
window.addEventListener("pageshow", initSlipperPage);
window.addEventListener("pwa:ready", initSlipperPage);
</script>

<script src="pwa-nav.js"></script>

</body>
</html>
