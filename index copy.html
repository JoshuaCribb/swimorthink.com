<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/icon16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/iconapple.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@swimorthink Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <a href="index.html">
    <img src="assets/logo.gif" alt="@swimorthink logo" class="logo" />
  </a>

  <div class="header-banner">
    <a href="cart.html">Shopping Cart</a>
  </div>

  </div>
</header>



 <main>
  <div class="products">
    <a href="polo.html" class="product-link">
      <div class="product">
        <div class="item">
          <img
            class="slideshow"
            src="assets/polo/polo1.png"
            data-images="assets/polo/polo1.png"
            alt="@swimorthink"
          />
        </div>
        <p class="price">$15</p>
      </div>
    </a>

    <a href="slipper.html" class="product-link">
      <div class="product">
        <div class="item">
          <img
            class="slideshow"
            src="assets/slipper/superdemo.png"
            data-images="assets/slipper/superdemo,assets/slipper/slipper/superdemo"
            alt="@swimorthink"
          />
        </div>
        <p class="price">$21</p>
      </div>
    </a>



<footer>
  <p>© <span id="year"></span>. All Rights Reserved.</p>
</footer>

 <script>
  document.querySelectorAll(".slideshow").forEach(img => {
    const images = img.dataset.images.split(",");

    function randomize() {
      const randomIndex = Math.floor(Math.random() * images.length);
      img.src = images[randomIndex];
    }

   
    randomize();

   
    setInterval(randomize, 2000);

    document.getElementById("year").textContent = new Date().getFullYear();
      const isLoggedIn = localStorage.getItem("loggedIn") === "true";
  const accountLink = document.getElementById("account-link");
  
  if (isLoggedIn) {
    accountLink.textContent = "My Account";
    accountLink.href = "account.html";
  } else {
    accountLink.textContent = "Login";
    accountLink.href = "login.html";
  }

  });
</script>

</body>
</html>
